<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sayfa Bulunamadı — Lezzet Atlası</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍳</text></svg>">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Manrope', sans-serif;
    background: linear-gradient(135deg, #FFF5F0 0%, #FFF0E6 40%, #F0F4FF 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
  }
  .container { max-width: 480px; }
  .emoji { font-size: 5rem; margin-bottom: 24px; }
  h1 {
    font-size: 2rem;
    font-weight: 800;
    color: #18181B;
    margin-bottom: 12px;
  }
  p {
    font-size: 1rem;
    color: #52525B;
    line-height: 1.7;
    margin-bottom: 32px;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 14px 28px;
    background: linear-gradient(135deg, #FF6B5B, #FF8C5A);
    color: white;
    border-radius: 999px;
    font-size: 0.95rem;
    font-weight: 700;
    text-decoration: none;
    box-shadow: 0 4px 14px rgba(255,107,91,0.35);
    transition: transform 0.15s;
  }
  .btn:hover { transform: translateY(-2px); }
</style>
</head>
<body>
  <div class="container">
    <div class="emoji">🍳</div>
    <h1>Sayfa Bulunamadı</h1>
    <p>Aradığın sayfa burada değil ama lezzetli tarifler sizi bekliyor!</p>
    <a href="/lezzet-atlasi" class="btn">🏠 Ana Sayfaya Dön</a>
  </div>
</body>
</html>
